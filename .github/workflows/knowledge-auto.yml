name: Auto Publish Knowledge Post

on:
  schedule:
    - cron: '0 8 * * *'   # 오후  5시 KST (UTC 08:00) — 건강지식 1개/일
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Auto-replenish knowledge keywords if low
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          prisma.keyword.count({ where: { used: false, category: { slug: 'knowledge' } } }).then(n => {
            console.log('건강지식 미사용 키워드 수:', n);
            process.exit(n < 10 ? 1 : 0);
          }).finally(() => prisma.\$disconnect());
          " && echo "키워드 충분" || (echo "키워드 부족 — 건강지식 키워드 자동 수집 시작" && node scripts/keyword-collector.js --category=knowledge --count=20)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate knowledge content
        run: node scripts/content-generator.js --count=1 --category=knowledge
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Publish knowledge post
        run: node scripts/publisher.js --mode=immediate --limit=1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          DAILY_POST_LIMIT: '2'
