name: Auto Publish Blog Post

on:
  workflow_dispatch:       # 수동 실행 버튼
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 4 * * *'   # 13:00 KST
    - cron: '0 8 * * *'   # 17:00 KST
    - cron: '0 12 * * *'  # 21:00 KST
    - cron: '0 16 * * *'  # 01:00 KST (다음날)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Auto-replenish keywords if low
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          prisma.keyword.count({ where: { used: false } }).then(n => {
            console.log('미사용 키워드 수:', n);
            process.exit(n < 20 ? 1 : 0);
          }).finally(() => prisma.\$disconnect());
          " && echo "키워드 충분" || (echo "키워드 부족 — 키워드 자동 수집 시작" && node scripts/keyword-collector.js --count=30)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate content
        run: node scripts/content-generator.js --count=1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Publish post
        run: node scripts/publisher.js --mode=immediate --limit=1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          DAILY_POST_LIMIT: '4'  # 하루 최대 4개 (--limit=1은 1회 실행당 1개)
